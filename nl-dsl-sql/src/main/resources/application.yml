server:
  host: localhost
  port: 7789
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: "nl-dsl-sql"
  ai:
    openai:
      api-key: sk-54034f01de884cfba1a05679d441e51f
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
        completions-path: /v1/chat/completions

nl2dslsql:
  database:
    default-dialect: sqlite
    supported-dialects:
      - postgresql
      - mysql
      - sqlite
  security:
    enable-sql-injection-check: true
    max-query-depth: 10
    allowed-operations:
      - SELECT
  output-format: plain
